
# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  minInstances: 1
  maxInstances: 10
  cpu: 1
  memory: 512Mi
  concurrency: 80
vpc:
  connector: "managed-vpc"
env:
  - variable: NODE_ENV
    value: "production"
