    value: "https://studio--studio-3849653404-e5627.us-central1.hosted.app"

  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCro9bdB4rd9oD64EYNamI3iIkKmWsOSbM"

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "studio-3849653404-e5627.firebaseapp.com"

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "studio-3849653404-e5627"

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "studio-3849653404-e5627.firebasestorage.app"

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "978801814369"

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
